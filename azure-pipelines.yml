# Node.js with Vue
# Build a Node.js project that uses Vue.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

pool: MyLocalAgents

stages:

# -----------------
# CI STAGE
# -----------------
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildVue
    displayName: 'Build Vue.js App'
    steps:

    # Checkout GitHub repo
    - checkout: self
      clean: true

    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    # Build Vue app with PowerShell
    - task: PowerShell@2
      displayName: 'Build Vue App & Verify dist'
      inputs:
        targetType: inline
        script: |
          Write-Host "Current folder:"
          Get-Location
          
          Write-Host "Listing files before build:"
          Get-ChildItem

          cd "$(Build.SourcesDirectory)"
          npm install
          npm run build

          Write-Host "Listing files after build:"
          Get-ChildItem

          if (Test-Path dist) {
              Write-Host "dist exists!"
          } else {
              Write-Error "dist folder does NOT exist! Build failed."
          }

    # Publish dist folder as artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish dist Artifact'
      inputs:
        targetPath: '$(Build.SourcesDirectory)\dist'
        artifact: 'vue-dist'

# -----------------
# CD STAGE
# -----------------
- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  jobs:
  - job: DeployToAzure
    displayName: 'Deploy to Azure Storage'
    pool:
      name: MyLocalAgents
    steps:

    # Download artifact from Build stage
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Build Artifact'
      inputs:
        artifact: 'vue-dist'
        path: '$(Build.ArtifactStagingDirectory)\vue-dist'

    # Deploy to Azure Storage Static Website using PowerShell
    - task: AzureCLI@2
      displayName: 'Upload to Azure Storage'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az storage blob upload-batch `
            --account-name wepapp19 `
            --destination '$web' `
            --source "$(Build.ArtifactStagingDirectory)\vue-dist"
